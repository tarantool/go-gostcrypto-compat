name: Bump go-gostcrypto

# Daily check for a new go-gostcrypto release. When one is out, bump the pinned
# version in go.mod/go.sum, validate it with the full clean-room vs gogost parity
# suite against the new release, and open (or update) a PR. Parity is a hard gate:
# if the new release diverges from the gogost reference the job fails and no PR is
# opened. The parity run resolves go-gostcrypto@<new> from the public proxy (no
# sibling checkout) — it validates compat against the actual release.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check and validate only — do not commit, push, or open a PR."
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bump-go-gostcrypto
  cancel-in-progress: false

env:
  GO_VERSION: 1.24
  BOT_NAME: "github-actions[bot]"
  BOT_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
  PR_BRANCH: automation/bump-go-gostcrypto

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Compare the version pinned in go.mod against the latest published tag.
      # sort -V | tail -1 guards against a downgrade if @latest resolves older.
      - name: resolve latest go-gostcrypto
        id: resolve
        run: |
          set -euo pipefail
          current=$(go list -m -f '{{.Version}}' github.com/tarantool/go-gostcrypto)
          latest=$(go list -m -f '{{.Version}}' github.com/tarantool/go-gostcrypto@latest)
          echo "current=${current}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          if [ "$latest" != "$current" ] && \
             [ "$(printf '%s\n%s\n' "$current" "$latest" | sort -V | tail -1)" = "$latest" ]; then
            echo "::notice::go-gostcrypto ${current} -> ${latest}"
            echo "bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::go-gostcrypto up to date at ${current}"
            echo "bump=false" >> "$GITHUB_OUTPUT"
          fi

      - name: bump go.mod and go.sum
        if: steps.resolve.outputs.bump == 'true'
        run: |
          set -euo pipefail
          go get github.com/tarantool/go-gostcrypto@${{ steps.resolve.outputs.latest }}
          go mod tidy

      - name: check for changes
        id: changes
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain go.mod go.sum)" ]; then
            echo "no version change"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: validate parity against the new release
        if: steps.changes.outputs.changed == 'true'
        run: go test ./... -count=1

      - name: create pull request
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != true
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          branch: ${{ env.PR_BRANCH }}
          base: master
          add-paths: |
            go.mod
            go.sum
          commit-message: |
            build: bump go-gostcrypto to ${{ steps.resolve.outputs.latest }}

            Automated bump of github.com/tarantool/go-gostcrypto.

            ${{ steps.resolve.outputs.current }} -> ${{ steps.resolve.outputs.latest }}.
          committer: "${{ env.BOT_NAME }} <${{ env.BOT_EMAIL }}>"
          author: "${{ env.BOT_NAME }} <${{ env.BOT_EMAIL }}>"
          title: "build: bump go-gostcrypto to ${{ steps.resolve.outputs.latest }}"
          body: |
            Automated bump of `github.com/tarantool/go-gostcrypto`.

            `${{ steps.resolve.outputs.current }}` → `${{ steps.resolve.outputs.latest }}`.

            Validated by the clean-room vs gogost parity suite against the new
            release. Release notes:
            https://github.com/tarantool/go-gostcrypto/releases/tag/${{ steps.resolve.outputs.latest }}
          delete-branch: true
