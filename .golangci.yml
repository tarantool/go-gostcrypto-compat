version: "2"

run:
  timeout: 3m

formatters:
  enable:
    - goimports

issues:
  # Disable limits on the number of printed issues
  max-issues-per-linter: 0 # 0 = no limit
  max-same-issues: 0 # 0 = no limit

linters:
  default: all

  disable:
    - dupl # Dupl is disabled, since we're generating a lot of boilerplate code.
    - cyclop # Cyclop is disabled, since cyclomatic complexities is very abstract metric,
      # that sometimes lead to strange linter behaviour.
    - wsl # WSL is disabled, since it's obsolete. Using WSL_v5.
    - nlreturn # nlreturn is disabled, since it's duplicated by wsl_v5.return check.
    - ireturn # ireturn is disabled, since it's not needed.
    - godox # godox is disabled to allow TODO comments for unimplemented functionality.
    - gocognit # gocognit is disabled, cognitive complexity is too restrictive.
    - funlen # funlen is disabled, function length limits are too restrictive.
    - maintidx # maintidx is disabled, purpose of this metric is unknown.

    # The following are disabled for this GOST crypto parity module: their checks
    # fight the domain idioms (short math variable names mirroring the GOST spec,
    # package-level S-box/constant lookup tables) or are noise on primitives and
    # KAT tables ported byte-for-byte from a reference.
    - varnamelen # GOST math uses short names (x, y, s, r, n, k, e) per the spec.
    - gochecknoglobals # crypto S-boxes / constant tables must be package globals.
    - exhaustruct # struct literals are intentionally partial across the API.
    - gosec # false positives on GOST primitives (weak-crypto / rand heuristics).
    - wrapcheck # internal sub-packages return their own errors unwrapped by design.
    - goconst # repeated small literals in KATs/tables are not worth extracting.
    - noinlineerr # inline `if err := ...; err != nil` is idiomatic here.
    - nonamedreturns # named returns are used deliberately in a few primitives.
    - godoclint # doc-comment formatting is not enforced for this module.
    - gochecknoinits # init() is used to build lookup tables at load time.
    - inamedparam # interface params are intentionally left unnamed.
    - intrange # not migrating loop forms mechanically.
    - gocritic # opinionated style suggestions, not enforced here.
    - revive # var-naming overlaps with the crypto short-name idiom above.

  exclusions:
    generated: lax
    rules:
      - path: _test.go
        linters:
          - wrapcheck
          - err113
          - funlen

  settings:
    godot:
      scope: all
    lll:
      line-length: 120
      tab-width: 4
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
      case-max-lines: 0
      default: all
    depguard:
      rules:
        # Unlike go-gostcrypto (which forbids GPL code), this module is the
        # deliberate home for the gogost reference. The allow-list therefore
        # includes gogost, the vendored aead/cmac oracle, and both sibling
        # modules; everything else stays out of the module graph.
        main:
          files:
            - "$all"
            - "!$test"
          allow:
            - $gostd
            - "github.com/tarantool/go-gostcrypto-compat"
            - "github.com/tarantool/go-gostcrypto"
            - "go.stargrave.org/gogost/v7"
        test:
          files:
            - "$test"
          allow:
            - $gostd
            - "github.com/tarantool/go-gostcrypto-compat"
            - "github.com/tarantool/go-gostcrypto"
            - "go.stargrave.org/gogost/v7"
            - "github.com/aead/cmac"
